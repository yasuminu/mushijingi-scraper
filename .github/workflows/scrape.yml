name: 蟲神器価格データ取得

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: リポジトリをチェックアウト
      uses: actions/checkout@v3
    
    - name: Pythonをセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: ライブラリをインストール
      run: |
        pip install requests beautifulsoup4
    
    - name: スクレイピング実行
      run: |
        python scraper.py
    
    - name: データをGitHubに保存
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add prices.json
        git diff --staged --quiet || git commit -m "価格データを更新 $(date '+%Y-%m-%d')"
        git push
